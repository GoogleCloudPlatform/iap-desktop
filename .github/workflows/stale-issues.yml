name: Mark and sweep inactive issues and pull-requests
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          debug-only: false
          days-before-stale: 60
          days-before-close: 10
          stale-issue-label: "stale"
          stale-issue-message: "This issue is stale because it has been open for 60 days with no activity."
          close-issue-message: "This issue was closed because it has been inactive for 10 days since being marked as stale."
          stale-pr-message: "This pull request is stale because it has been open for 60 days with no activity."
          close-pr-message: "This pull request was closed because it has been inactive for 10 days since being marked as stale."
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          exempt-issue-labels: enhancement